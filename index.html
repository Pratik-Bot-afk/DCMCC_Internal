<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Style Sale</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
        }

        header {
            background: #000;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            color: gold;
            margin: 0;
        }

        .banner {
            background: linear-gradient(to right, #000, #333);
            padding: 50px;
            text-align: center;
        }

        .banner h2 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: gold;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background: gold;
            color: black;
            text-decoration: none;
            border-radius: 5px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #000;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header> 
    <h1>White Collection</h1>
    <p>Exclusive Men's Fashion Sale</p>
</header>

<section class="banner">
    <h2>UP TO 100% OFF</h2>
    <p>Premium fashion curated for style & confidence</p>
</section>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/300x300" alt="Jacket">
        <h3>Streetwear Jacket</h3>
        <p class="price">$49.99</p>
        <a href="#" class="btn">Buy Now</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x300" alt="Hoodie">
        <h3>Urban Hoodie</h3>
        <p class="price">$29.99</p>
        <a href="#" class="btn">Buy Now</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x300" alt="Shoes">
        <h3>Classic Sneakers</h3>
        <p class="price">$59.99</p>
        <a href="#" class="btn">Buy Now</a>
    </div>

</section>

<footer>
    <p>© 2026 Black Style Collection | All Rights Reserved</p>
</footer>

</body>
</html>
